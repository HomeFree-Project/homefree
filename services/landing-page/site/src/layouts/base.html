<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="generator" content="{{ eleventy.generator }}">
    <meta name="description" content="{{ data.subtagline }}">
    <meta name="author" content="{{ data.author }}">
    <meta name="keywords" content="{{ data.keywords.en }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">

    <link rel="stylesheet" href="{{ '/css/main.css' | assetVersion }}">
    <noscript><link rel="stylesheet" href="{{ '/css/noscript.css' | assetVersion }}" /></noscript>

    <meta property="og:title" content="{{ title }}">
    <meta property="og:description" content="{{ data.subtagline }}">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#0a0c0a">

    <title>{{ title }}</title>
  </head>
  <body>
    {% include "elements/header.html" %}
    <main>
      {{ content | safe }}
    </main>
    {% include "elements/footer.html" %}
    <script src="{{ '/js/landing.js' | assetVersion }}" defer></script>
  </body>
</html>

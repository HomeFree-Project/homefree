<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomeFree Installer</title>

  <!-- Import map for Lit module resolution (vendored locally) -->
  <script type="importmap">
  {
    "imports": {
      "lit": "/src/vendor/lit/index.js",
      "lit/": "/src/vendor/lit/",
      "@lit/reactive-element": "/src/vendor/@lit/reactive-element/reactive-element.js",
      "@lit/reactive-element/": "/src/vendor/@lit/reactive-element/",
      "lit-html": "/src/vendor/lit-html/lit-html.js",
      "lit-html/": "/src/vendor/lit-html/",
      "lit-element": "/src/vendor/lit-element/lit-element.js",
      "lit-element/": "/src/vendor/lit-element/"
    }
  }
  </script>

  <!-- Paint the dark theme background before any CSS/JS loads so
       cross-subdomain navigations (home <-> admin) don't flash white.
       #0a0c0a is --hf-bg from src/shared/theme.js; color-scheme:dark
       keeps the browser's own UI (scrollbars, form controls) dark too. -->
  <meta name="color-scheme" content="dark">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      background: #0a0c0a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      color-scheme: dark;
      min-height: 100vh;
      overflow: hidden;
    }

    #app {
      width: 100%;
      height: 100vh;
      position: relative;
    }

    /* Initial loading spinner - shown before any JS loads */
    #app:empty::before {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      width: 48px;
      height: 48px;
      margin: -24px 0 0 -24px;
      border: 4px solid rgba(52, 211, 153, 0.15);
      border-top-color: #34d399;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    #app:empty::after {
      content: 'Loading HomeFree...';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, 40px);
      font-size: 16px;
      color: #757c87;
      font-weight: 500;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Hide the loading spinner once custom element is defined */
    homefree-app:defined {
      display: block;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    // Auth preflight before loading the SPA.
    //
    // Symptom we're guarding against: the HTML somehow loads in an
    // unauthenticated state (bfcache restore, browser-cached HTML
    // outliving the oauth2-proxy cookie, an old still-open tab the
    // user came back to after sign-out, etc.) — and then the very
    // next thing the browser does is fetch /src/app.js as a module.
    // That fetch hits Caddy's forward_auth, gets 302'd cross-origin
    // to auth.<domain>/oauth2/start, and the module loader refuses
    // (cross-origin redirect + MIME mismatch). The page is now
    // permanently stuck on the loading spinner with CORS errors in
    // the console.
    //
    // The fix: before importing the SPA, probe /api/mode with
    // redirect: 'manual'. If we're authed, it returns a normal 200
    // (or a same-origin error we can surface). If we're not, the
    // response.type will be 'opaqueredirect' — and we do a full
    // window.location reload to '/', which sends the browser
    // through Caddy's forward_auth as a NAVIGATION (not a module
    // fetch), which Caddy responds to with a top-level 302 that the
    // browser follows normally into the SSO flow.
    //
    // Also catches the bfcache-restore case (pageshow.persisted)
    // for older browsers where Cache-Control:no-store alone isn't
    // enough to disable bfcache.
    window.addEventListener('pageshow', (e) => {
      if (e.persisted) window.location.reload();
    });

    (async () => {
      try {
        const r = await fetch('/api/mode', {
          redirect: 'manual',
          credentials: 'same-origin',
          cache: 'no-store',
        });
        if (r.type === 'opaqueredirect' || r.status === 0) {
          // Unauthed — force a top-level navigation through Caddy.
          window.location.replace('/?_=' + Date.now());
          return;
        }
        if (r.status === 401 || r.status === 403) {
          // Authed but not allowed (e.g. signed in as wrong user).
          // Let the SPA boot — it will render the access-denied
          // page using the error body.
        }
      } catch (err) {
        // Network or CORS error in the probe means the same thing
        // an opaqueredirect does: we're not authed. Force a real
        // navigation.
        window.location.href = '/';
        return;
      }
      // Auth OK — load the SPA.
      const s = document.createElement('script');
      s.type = 'module';
      s.src = '/src/app.js';
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>

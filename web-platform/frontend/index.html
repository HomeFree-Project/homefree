<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomeFree Installer</title>

  <!-- Import map for Lit module resolution (vendored locally) -->
  <script type="importmap">
  {
    "imports": {
      "lit": "/src/vendor/lit/index.js",
      "lit/": "/src/vendor/lit/",
      "@lit/reactive-element": "/src/vendor/@lit/reactive-element/reactive-element.js",
      "@lit/reactive-element/": "/src/vendor/@lit/reactive-element/",
      "lit-html": "/src/vendor/lit-html/lit-html.js",
      "lit-html/": "/src/vendor/lit-html/",
      "lit-element": "/src/vendor/lit-element/lit-element.js",
      "lit-element/": "/src/vendor/lit-element/"
    }
  }
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      overflow: hidden;
    }

    #app {
      width: 100%;
      height: 100vh;
      position: relative;
    }

    /* Initial loading spinner - shown before any JS loads */
    #app:empty::before {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      width: 48px;
      height: 48px;
      margin: -24px 0 0 -24px;
      border: 4px solid rgba(102, 126, 234, 0.1);
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    #app:empty::after {
      content: 'Loading HomeFree...';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, 40px);
      font-size: 16px;
      color: #86868b;
      font-weight: 500;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Hide the loading spinner once custom element is defined */
    homefree-app:defined {
      display: block;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/app.js"></script>
</body>
</html>
